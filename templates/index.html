<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Newsie">
  <link rel="apple-touch-icon" href="/static/icon.png">
  <link rel="icon" type="image/png" href="/static/icon.png">
  <!-- Open Graph (sharing previews) -->
  <meta property="og:title" content="Newsie">
  <meta property="og:description" content="Your free Apple News — all your sources, no paywall.">
  <meta property="og:image" content="https://newsie-production.up.railway.app/static/icon.png">
  <meta property="og:url" content="https://newsie-production.up.railway.app">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Newsie">
  <meta name="twitter:description" content="Your free Apple News — all your sources, no paywall.">
  <meta name="twitter:image" content="https://newsie-production.up.railway.app/static/icon.png">
  <title>Newsie</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header id="header">
      <div class="header-inner">
        <div class="header-top">
          <div class="header-title-group">
            <div class="header-brand">
              <img src="/static/icon.png" class="header-logo" alt="Newsie">
              <span class="header-brand-name">Newsie</span>
            </div>
            <h1 class="header-title" id="header-title">Today</h1>
            <p class="header-date" id="header-date"></p>
          </div>
          <div class="header-actions">
            <button class="icon-btn" id="refresh-btn" title="Refresh" aria-label="Refresh">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
              </svg>
            </button>
            <button class="icon-btn" id="settings-btn" title="Manage Sources" aria-label="Manage Sources">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
                <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="source-filter">
          <div class="source-chips" id="source-chips"></div>
        </div>
      </div>
      <!-- Market ticker -->
      <div id="ticker-bar" class="ticker-bar">
        <div class="ticker-track" id="ticker-track"></div>
      </div>
    </header>

    <!-- Pull to refresh indicator -->
    <div id="ptr-indicator" class="ptr-indicator">
      <div class="ptr-spinner"></div>
    </div>

    <!-- Main feed -->
    <main id="main">
      <div id="feed" class="feed">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading your news…</p>
        </div>
      </div>
    </main>

    <!-- Tab bar -->
    <nav class="tab-bar" id="tab-bar">
      <button class="tab active" data-tab="today">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="16" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="4" x2="9" y2="9"/>
          <line x1="15" y1="4" x2="15" y2="9"/>
          <line x1="7" y1="13" x2="12" y2="13"/>
          <line x1="7" y1="17" x2="10" y2="17"/>
        </svg>
        <span>Today</span>
      </button>
      <button class="tab" data-tab="sports">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 3c0 0-3 4-3 9s3 9 3 9"/>
          <path d="M12 3c0 0 3 4 3 9s-3 9-3 9"/>
          <path d="M3 12h18"/>
        </svg>
        <span>Sports</span>
      </button>
      <button class="tab" data-tab="magazines">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span>Magazines</span>
      </button>
      <button class="tab" data-tab="following">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span>Following</span>
      </button>
      <button class="tab" data-tab="search">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>Search</span>
      </button>
    </nav>

  </div>
  <!-- Settings Panel -->
  <div id="settings-overlay" class="settings-overlay hidden"></div>
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-header">
      <button class="settings-back" id="settings-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Done
      </button>
      <h2 class="settings-title">Manage Sources</h2>
    </div>

    <div class="settings-body">
      <!-- Built-in sources -->
      <div class="settings-section-label">YOUR SOURCES</div>
      <div class="settings-card" id="sources-list"></div>

      <!-- Custom sources -->
      <div class="settings-section-label" id="custom-label" style="display:none">CUSTOM SOURCES</div>
      <div class="settings-card" id="custom-sources-list"></div>

      <!-- Add buttons -->
      <div class="settings-section-label">ADD NEW</div>
      <div class="settings-card">
        <button class="settings-action-row" id="add-periodical-btn">
          <span class="settings-action-icon" style="background:#007AFF">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" width="16" height="16"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="12" y1="9" x2="12" y2="15"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
          </span>
          <span>Add Periodical</span>
          <svg class="settings-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <div class="settings-separator"></div>
        <button class="settings-action-row" id="add-topic-btn">
          <span class="settings-action-icon" style="background:#34C759">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" width="16" height="16"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </span>
          <span>Add Topic</span>
          <svg class="settings-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <!-- Add Periodical form -->
    <div id="add-periodical-form" class="settings-form hidden">
      <div class="settings-header">
        <button class="settings-back" id="periodical-back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <h2 class="settings-title">Add Periodical</h2>
      </div>
      <div class="settings-body">
        <div class="settings-section-label">RSS FEED URL</div>
        <div class="settings-card" style="padding: 12px 14px">
          <input id="periodical-url" class="settings-input" type="url" placeholder="https://example.com/feed.xml" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <div class="settings-section-label">DISPLAY NAME</div>
        <div class="settings-card" style="padding: 12px 14px">
          <input id="periodical-name" class="settings-input" type="text" placeholder="e.g. TechCrunch">
        </div>
        <button class="settings-primary-btn" id="periodical-preview-btn">Preview Feed</button>
        <div id="periodical-preview-result" class="preview-result hidden"></div>
        <button class="settings-primary-btn hidden" id="periodical-add-btn" style="background:#34C759">Add to Newsie</button>
        <p id="periodical-error" class="settings-error hidden"></p>
      </div>
    </div>

    <!-- Add Topic form -->
    <div id="add-topic-form" class="settings-form hidden">
      <div class="settings-header">
        <button class="settings-back" id="topic-back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <h2 class="settings-title">Add Topic</h2>
      </div>
      <div class="settings-body">
        <div class="settings-section-label">TOPIC</div>
        <div class="settings-card" style="padding: 12px 14px">
          <input id="topic-name" class="settings-input" type="text" placeholder='e.g. "Formula 1" or "Climate"'>
        </div>
        <p class="settings-hint">Newsie will pull the latest news about this topic from Google News.</p>
        <button class="settings-primary-btn" id="topic-add-btn">Add Topic</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
