<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Newsie">
  <link rel="apple-touch-icon" href="/static/icon.png">
  <link rel="icon" type="image/png" href="/static/icon.png">
  <title>Newsie</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header id="header">
      <div class="header-inner">
        <div class="header-top">
          <div class="header-title-group">
            <div class="header-brand">
              <img src="/static/icon.png" class="header-logo" alt="Newsie">
              <span class="header-brand-name">Newsie</span>
            </div>
            <h1 class="header-title" id="header-title">Today</h1>
            <p class="header-date" id="header-date"></p>
          </div>
          <button class="icon-btn" id="refresh-btn" title="Refresh" aria-label="Refresh">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 4v6h-6"/>
              <path d="M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
          </button>
        </div>
        <div class="source-filter">
          <div class="source-chips" id="source-chips"></div>
        </div>
      </div>
    </header>

    <!-- Pull to refresh indicator -->
    <div id="ptr-indicator" class="ptr-indicator">
      <div class="ptr-spinner"></div>
    </div>

    <!-- Main feed -->
    <main id="main">
      <div id="feed" class="feed">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading your news…</p>
        </div>
      </div>
    </main>

    <!-- Tab bar -->
    <nav class="tab-bar" id="tab-bar">
      <button class="tab active" data-tab="today">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="16" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="4" x2="9" y2="9"/>
          <line x1="15" y1="4" x2="15" y2="9"/>
          <line x1="7" y1="13" x2="12" y2="13"/>
          <line x1="7" y1="17" x2="10" y2="17"/>
        </svg>
        <span>Today</span>
      </button>
      <button class="tab" data-tab="sports">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 3c0 0-3 4-3 9s3 9 3 9"/>
          <path d="M12 3c0 0 3 4 3 9s-3 9-3 9"/>
          <path d="M3 12h18"/>
        </svg>
        <span>Sports</span>
      </button>
      <button class="tab" data-tab="magazines">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span>Magazines</span>
      </button>
      <button class="tab" data-tab="following">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span>Following</span>
      </button>
      <button class="tab" data-tab="search">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>Search</span>
      </button>
    </nav>

  </div>
  <script src="/static/app.js"></script>
</body>
</html>
